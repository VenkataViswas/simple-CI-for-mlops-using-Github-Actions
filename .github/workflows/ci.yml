name: CI - train and save model

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # name what we like
  matrix-pip:
    name: Train and save the model
    runs-on: ubuntu-latest

    strategy:
      # to run with multiple python versions we use matrix
      # if only one version no need matrix
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
      - name: checkout
        uses: actions/checkout@v4
        # instead of writing manually shell script for git clone <url> this is much faster and better

      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: install uv
        run: pip install uv

      - name: sync dependencies
        run: uv sync

      - name: train the model
        run: uv run python train.py
